naftiko: 1.0.0-alpha2
info:
  label: Amazon Transcribe API — Vocabularies
  description: 'Amazon Transcribe API — Vocabularies. 1 operations. Lead operation: Amazon Transcribe Create a Custom Vocabulary.
    Self-contained Naftiko capability covering one Amazon Transcribe business surface.'
  tags:
  - Amazon Transcribe
  - Vocabularies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_TRANSCRIBE_API_KEY: AMAZON_TRANSCRIBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-transcribe-vocabularies
    baseUri: https://transcribe.{region}.amazonaws.com
    description: Amazon Transcribe API — Vocabularies business capability. Self-contained, no shared references.
    resources:
    - name: '#CreateVocabulary'
      path: /#CreateVocabulary
      operations:
      - name: createvocabulary
        method: POST
        description: Amazon Transcribe Create a Custom Vocabulary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_TRANSCRIBE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-transcribe-vocabularies-rest
    port: 8080
    description: REST adapter for Amazon Transcribe API — Vocabularies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/createvocabulary
      name: createvocabulary
      description: 'REST surface for #CreateVocabulary.'
      operations:
      - method: POST
        name: createvocabulary
        description: Amazon Transcribe Create a Custom Vocabulary
        call: amazon-transcribe-vocabularies.createvocabulary
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-transcribe-vocabularies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Transcribe API — Vocabularies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-transcribe-create-custom-vocabulary
      description: Amazon Transcribe Create a Custom Vocabulary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-transcribe-vocabularies.createvocabulary
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
